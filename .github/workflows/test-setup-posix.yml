name: Test dotfiles (POSIX)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-setup:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        shell: bash
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Add chezmoi to PATH
        shell: bash
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run chezmoi init --apply
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          chezmoi init --apply \
            --promptString email=chujie.zeng@gmail.com \
            --promptString 'name=Chujie Zeng' \
            "$GITHUB_WORKSPACE"

      - name: Verify config files exist
        shell: bash
        run: |
          test -f "$HOME/.config/fish/config.fish" || { echo "FAIL: fish config missing"; exit 1; }
          test -f "$HOME/.gitconfig" || { echo "FAIL: gitconfig missing"; exit 1; }
          test -f "$HOME/.config/git/aliases.gitconfig" || { echo "FAIL: git aliases missing"; exit 1; }

      - name: Verify fish config contains managed block
        shell: bash
        run: |
          grep -q '# BEGIN chezmoi managed' "$HOME/.config/fish/config.fish" || { echo "FAIL: managed block missing"; exit 1; }
          grep -q 'starship init fish' "$HOME/.config/fish/config.fish" || { echo "FAIL: starship init missing"; exit 1; }

      - name: Verify gitconfig has user section
        shell: bash
        run: |
          grep -q 'name =' "$HOME/.gitconfig" || { echo "FAIL: name missing"; exit 1; }
          grep -q 'email =' "$HOME/.gitconfig" || { echo "FAIL: email missing"; exit 1; }

      - name: Verify chezmoi apply is idempotent
        shell: bash
        run: |
          diff_output=$(chezmoi diff --exclude=scripts 2>&1) || true
          if [ -n "$diff_output" ]; then
            echo "FAIL: chezmoi apply not idempotent"
            echo "$diff_output"
            exit 1
          fi

  snapshot-rendered:
    if: github.event_name == 'push'
    needs: test-setup
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        shell: bash
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Add chezmoi to PATH
        shell: bash
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run chezmoi init --apply
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          chezmoi init --apply \
            --promptString email=chujie.zeng@gmail.com \
            --promptString 'name=Chujie Zeng' \
            "$GITHUB_WORKSPACE"

      - name: Render install script
        shell: bash
        run: |
          chezmoi execute-template \
            < "$GITHUB_WORKSPACE/home/run_once_00_install_packages.sh.tmpl" \
            > "$RUNNER_TEMP/install-packages.sh"

      - name: Set up SSH for dev-environment
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_ENV_DEPLOY_KEY }}

      - name: Clone dev-environment
        shell: bash
        run: git clone --depth 1 "git@github.com:${GITHUB_REPOSITORY_OWNER}/dev-environment.git" "$RUNNER_TEMP/dev-environment"

      - name: Collect rendered files
        shell: bash
        run: |
          rm -rf "$RUNNER_TEMP/dev-environment/home"
          while IFS= read -r src; do
            [ -f "$src" ] || continue
            rel="${src#"$HOME/"}"
            dest="$RUNNER_TEMP/dev-environment/home/$rel"
            mkdir -p "$(dirname "$dest")"
            cp "$src" "$dest"
          done < <(chezmoi managed --path-style absolute)
          cp "$RUNNER_TEMP/install-packages.sh" "$RUNNER_TEMP/dev-environment/install-packages.sh"

      - name: Commit and push snapshot
        shell: bash
        run: |
          cd "$RUNNER_TEMP/dev-environment"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add home/ install-packages.sh
          if git diff --cached --quiet; then
            echo "No changes to snapshot, skipping push"
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          git commit \
            -m "Snapshot from dotfiles@${SHORT_SHA}" \
            -m "Source: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          git push origin HEAD

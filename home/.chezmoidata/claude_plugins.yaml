# Claude Code plugin manifest. Consumed by run_once_after_install_claude_plugins.sh.tmpl.
#
# - marketplaces: non-default marketplaces to register. claude-plugins-official
#   is bundled and must not be listed here. Each entry adds via:
#     claude plugin marketplace add <repo>
#   The `name` field is used solely for the idempotency check against
#   `claude plugin marketplace list --json`. The CLI derives the registered
#   marketplace name from the upstream marketplace manifest, not from `name`
#   here, so each entry's `name` MUST match what the upstream marketplace
#   declares. The `repo` field is what gets passed to the CLI.
# - plugins.enabled: installed at user scope and left active.
# - plugins.disabled: installed at user scope, then disabled, so they are
#   cached locally but inert until manually enabled via /plugin or
#   `claude plugin enable`. Subsequent re-runs do not touch enable state,
#   so user toggles via /plugin survive.

claude:
  marketplaces:
    - {name: obsidian-skills,  repo: kepano/obsidian-skills}
    - {name: chezmoi-cookbook, repo: Psycho7/chezmoi-cookbook}
    - {name: openai-codex,     repo: openai/codex-plugin-cc}
  plugins:
    enabled:
      - claude-md-management@claude-plugins-official
      - code-simplifier@claude-plugins-official
      - superpowers@claude-plugins-official
      - obsidian@obsidian-skills
      - claude-code-setup@claude-plugins-official
    disabled:
      - typescript-lsp@claude-plugins-official
      - pyright-lsp@claude-plugins-official
      - csharp-lsp@claude-plugins-official
      - rust-analyzer-lsp@claude-plugins-official
      - clangd-lsp@claude-plugins-official
      - skill-creator@claude-plugins-official
      - feature-dev@claude-plugins-official
      - codex@openai-codex
